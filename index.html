<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seema Silai Centre – Where Fabric Becomes Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-pale: #f5e9c8;
      --crimson: #8b1a2f;
      --cream: #faf6ef;
      --dark: #1a1008;
      --mid: #3d2b1f;
      --silk: #f0e6d3;
      --shadow: rgba(26,16,8,0.18);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--cream);
      color: var(--dark);
      font-family: 'Raleway', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* CUSTOM CURSOR */
    .cursor {
      width: 12px; height: 12px;
      background: var(--gold);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      transition: transform 0.1s, background 0.2s;
      mix-blend-mode: multiply;
    }
    .cursor-ring {
      width: 40px; height: 40px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      position: fixed; top: 0; left: 0;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: transform 0.35s ease, opacity 0.2s;
      opacity: 0.7;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    /* ===================== NAVBAR ===================== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 20px 5%;
      display: flex; align-items: center; justify-content: space-between;
      background: transparent;
      transition: background 0.5s, padding 0.4s;
    }
    nav.scrolled {
      background: rgba(250,246,239,0.97);
      padding: 12px 5%;
      box-shadow: 0 2px 30px var(--shadow);
      backdrop-filter: blur(10px);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 600;
      color: var(--dark); letter-spacing: 0.05em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--gold); font-style: italic; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-size: 0.75rem; letter-spacing: 0.18em;
      text-transform: uppercase; text-decoration: none;
      color: var(--mid); font-weight: 500;
      position: relative; padding-bottom: 4px;
      transition: color 0.3s;
    }
    .nav-links a::after {
      content: '';
      position: absolute; bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.35s ease;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      background: var(--gold) !important;
      color: var(--dark) !important;
      padding: 10px 24px !important;
      border-radius: 2px;
      font-weight: 600 !important;
      transition: background 0.3s, transform 0.2s !important;
    }
    .nav-cta:hover { background: var(--gold-light) !important; transform: translateY(-1px); }
    .nav-cta::after { display: none !important; }

    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; z-index: 1100; }
    .hamburger span { width: 26px; height: 1.5px; background: var(--dark); display: block; transition: 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--cream);
      z-index: 1050;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 36px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 300;
      color: var(--dark); text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.3s;
    }
    .mobile-menu a:hover { color: var(--gold); }

    /* ===================== HERO ===================== */
    #hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative; overflow: hidden;
    }
    .hero-left {
      display: flex; flex-direction: column; justify-content: center;
      padding: 140px 6% 80px 8%;
      position: relative; z-index: 2;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); font-weight: 500; margin-bottom: 28px;
    }
    .hero-badge::before {
      content: ''; display: block; width: 36px; height: 1px; background: var(--gold);
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.2rem, 5.5vw, 5.5rem);
      font-weight: 300; line-height: 1.08;
      color: var(--dark); margin-bottom: 32px;
    }
    .hero-title em { font-style: italic; color: var(--crimson); display: block; }
    .hero-title strong { font-weight: 600; display: block; }
    .hero-desc {
      font-size: 0.95rem; line-height: 1.85;
      color: var(--mid); max-width: 420px;
      margin-bottom: 48px; font-weight: 300;
    }
    .hero-actions { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
    .btn-primary {
      background: var(--dark); color: var(--cream);
      padding: 15px 36px; font-size: 0.72rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      text-decoration: none; font-family: 'Raleway', sans-serif;
      font-weight: 500; border: none; cursor: pointer;
      transition: background 0.35s, transform 0.25s;
      display: inline-block;
    }
    .btn-primary:hover { background: var(--crimson); transform: translateY(-2px); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--dark); text-decoration: none; font-weight: 500;
      border-bottom: 1px solid var(--dark); padding-bottom: 4px;
      transition: color 0.3s, border-color 0.3s;
    }
    .btn-secondary:hover { color: var(--gold); border-color: var(--gold); }
    .hero-stats {
      display: flex; gap: 40px; margin-top: 60px;
      padding-top: 40px; border-top: 1px solid rgba(201,168,76,0.3);
    }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem; font-weight: 600; color: var(--dark); line-height: 1;
    }
    .stat-num span { color: var(--gold); }
    .stat-label {
      font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--mid); margin-top: 4px; font-weight: 400;
    }
    .hero-right { position: relative; overflow: hidden; }
    .hero-right::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--gold-pale) 0%, var(--silk) 100%);
      z-index: 0;
    }
    .hero-fabric-bg {
      position: absolute; inset: 0; z-index: 1;
      background-image:
        repeating-linear-gradient(45deg, rgba(201,168,76,0.08) 0px, rgba(201,168,76,0.08) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(-45deg, rgba(201,168,76,0.06) 0px, rgba(201,168,76,0.06) 1px, transparent 1px, transparent 12px);
    }
    .hero-img-frame {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 70%; max-width: 380px; z-index: 3;
    }
    .hero-img-frame::before {
      content: ''; position: absolute;
      top: -16px; left: -16px; right: 16px; bottom: 16px;
      border: 1.5px solid var(--gold); z-index: -1;
    }
    .hero-img-placeholder {
      width: 100%; aspect-ratio: 3/4;
      background: linear-gradient(160deg, var(--gold-pale), var(--silk), var(--gold-pale));
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
    }
    .hero-img-placeholder span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem; color: var(--gold); opacity: 0.5;
    }
    .hero-img-placeholder p {
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--mid); opacity: 0.6;
    }
    .hero-float-tag {
      position: absolute; background: var(--dark); color: var(--cream);
      padding: 16px 22px; font-size: 0.7rem;
      letter-spacing: 0.12em; text-transform: uppercase; z-index: 5;
    }
    .hero-float-tag.top-left { top: 15%; left: -5%; }
    .hero-float-tag.bottom-right { bottom: 20%; right: -5%; }
    .hero-float-tag strong {
      display: block; font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 600;
      letter-spacing: 0; text-transform: none;
      color: var(--gold); margin-bottom: 2px;
    }

    /* ===================== MARQUEE ===================== */
    .marquee-strip {
      background: var(--dark); padding: 16px 0; overflow: hidden;
      border-top: 1px solid rgba(201,168,76,0.3);
      border-bottom: 1px solid rgba(201,168,76,0.3);
    }
    .marquee-inner {
      display: flex; gap: 0;
      animation: marquee 25s linear infinite;
      white-space: nowrap;
    }
    .marquee-item {
      padding: 0 40px; font-size: 0.68rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold); font-weight: 400;
      display: inline-flex; align-items: center; gap: 20px;
    }
    .marquee-item::after { content: '✦'; color: var(--crimson); font-size: 0.5rem; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ===================== ABOUT ===================== */
    #about {
      padding: 120px 8%;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 80px; align-items: center;
    }
    .about-img-collage { position: relative; height: 580px; }
    .collage-img {
      position: absolute; object-fit: cover;
      filter: sepia(8%) contrast(1.05);
    }
    .collage-box {
      position: absolute; background: linear-gradient(135deg, var(--gold-pale), var(--silk));
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
    }
    .collage-box span { font-size: 2.5rem; color: var(--gold); opacity: 0.5; }
    .collage-box p { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--mid); opacity: 0.7; }
    .collage-box.c1 {
      width: 62%; aspect-ratio: 2/3;
      top: 0; left: 0;
      border: 6px solid white;
      box-shadow: 12px 12px 40px var(--shadow);
    }
    .collage-box.c2 {
      width: 48%; aspect-ratio: 3/4;
      bottom: 0; right: 0;
      border: 6px solid white;
      box-shadow: 12px 12px 40px var(--shadow);
    }
    .collage-accent {
      position: absolute; bottom: 18%; left: 55%;
      width: 100px; height: 100px;
      background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem; font-style: italic;
      color: var(--dark); text-align: center;
      padding: 12px; line-height: 1.4;
      box-shadow: 6px 6px 20px var(--shadow);
    }
    .section-tag {
      font-size: 0.65rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); font-weight: 500;
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .section-tag::before { content: ''; display: block; width: 28px; height: 1px; background: var(--gold); }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 3.5vw, 3.6rem);
      font-weight: 300; line-height: 1.15;
      color: var(--dark); margin-bottom: 28px;
    }
    .section-title em { color: var(--crimson); font-style: italic; }
    .section-title strong { font-weight: 600; }
    .about-text p {
      font-size: 0.92rem; line-height: 1.9;
      color: var(--mid); margin-bottom: 18px; font-weight: 300;
    }
    .about-signature {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-style: italic;
      color: var(--crimson); margin-top: 32px;
    }
    .about-signature span {
      display: block; font-family: 'Raleway', sans-serif;
      font-size: 0.65rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--mid);
      margin-top: 4px; font-style: normal;
    }

    /* ===================== SERVICES ===================== */
    #services {
      background: var(--dark); padding: 120px 8%;
      position: relative; overflow: hidden;
    }
    #services::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .services-header { text-align: center; margin-bottom: 80px; }
    .services-header .section-tag { justify-content: center; }
    .services-header .section-tag::before { display: none; }
    .services-header .section-title { color: var(--cream); }
    .services-header p {
      font-size: 0.9rem; color: rgba(240,230,211,0.7);
      max-width: 520px; margin: 0 auto; line-height: 1.85;
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2px;
    }
    .service-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.15);
      padding: 50px 36px; position: relative; overflow: hidden;
      cursor: default; transition: background 0.4s, transform 0.3s;
    }
    .service-card::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 2px; background: var(--gold);
      transition: width 0.5s ease;
    }
    .service-card:hover { background: rgba(201,168,76,0.07); transform: translateY(-4px); }
    .service-card:hover::after { width: 100%; }
    .service-icon { font-size: 2rem; margin-bottom: 24px; display: block; }
    .service-num {
      position: absolute; top: 24px; right: 28px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem; font-weight: 600;
      color: rgba(201,168,76,0.08); line-height: 1;
    }
    .service-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; color: var(--gold-light);
      margin-bottom: 14px; font-weight: 400;
    }
    .service-desc { font-size: 0.82rem; line-height: 1.85; color: rgba(240,230,211,0.65); }
    .service-tags { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 6px; }
    .service-tag {
      font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 10px; border: 1px solid rgba(201,168,76,0.3);
      color: rgba(201,168,76,0.7); border-radius: 1px;
    }

    /* ===================== GALLERY ===================== */
    #gallery { padding: 120px 8%; background: var(--cream); }
    .gallery-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 60px; flex-wrap: wrap; gap: 20px;
    }
    .gallery-filter { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 18px; font-size: 0.68rem; letter-spacing: 0.15em;
      text-transform: uppercase; border: 1px solid rgba(61,43,31,0.2);
      background: transparent; color: var(--mid); cursor: pointer;
      font-family: 'Raleway', sans-serif; transition: 0.3s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--dark); color: var(--cream); border-color: var(--dark);
    }
    .gallery-masonry { columns: 4; gap: 16px; }
    .gallery-item {
      break-inside: avoid; margin-bottom: 16px;
      overflow: hidden; position: relative; cursor: pointer;
    }
    .gallery-placeholder {
      width: 100%; display: block;
      background: linear-gradient(135deg, var(--gold-pale), var(--silk), var(--gold-pale));
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
      transition: transform 0.6s ease;
    }
    .gallery-placeholder span { font-size: 2rem; color: var(--gold); opacity: 0.4; }
    .gallery-placeholder p { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid); opacity: 0.5; }
    .gallery-item:hover .gallery-placeholder { transform: scale(1.07); }
    .gallery-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(26,16,8,0.85) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.4s;
      display: flex; align-items: flex-end; padding: 20px;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; color: var(--cream); font-style: italic;
    }

    /* ===================== PROCESS ===================== */
    #process { background: var(--silk); padding: 120px 8%; position: relative; }
    .process-header { text-align: center; margin-bottom: 80px; }
    .process-header .section-tag { justify-content: center; }
    .process-header .section-tag::before { display: none; }
    .process-steps {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0; position: relative;
    }
    .process-steps::before {
      content: ''; position: absolute; top: 48px; left: 12.5%;
      width: 75%; height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent, var(--gold), transparent, var(--gold));
      z-index: 0;
    }
    .step { text-align: center; padding: 0 24px; position: relative; z-index: 1; }
    .step-circle {
      width: 96px; height: 96px; border-radius: 50%;
      background: var(--cream); border: 1.5px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 600; color: var(--gold);
      box-shadow: 0 6px 28px rgba(201,168,76,0.18);
      transition: background 0.4s, color 0.3s;
    }
    .step:hover .step-circle { background: var(--gold); color: var(--dark); }
    .step-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; color: var(--dark); margin-bottom: 12px;
    }
    .step-desc { font-size: 0.8rem; color: var(--mid); line-height: 1.8; }

    /* ===================== TESTIMONIALS ===================== */
    #testimonials { background: var(--dark); padding: 120px 8%; position: relative; }
    .testi-header { text-align: center; margin-bottom: 70px; }
    .testi-header .section-tag { justify-content: center; }
    .testi-header .section-tag::before { display: none; }
    .testi-header .section-title { color: var(--cream); }
    .testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .testi-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.15);
      padding: 40px 32px; position: relative;
    }
    .testi-quote {
      font-size: 4rem; line-height: 0.6;
      font-family: 'Cormorant Garamond', serif;
      color: var(--gold); margin-bottom: 20px; display: block;
    }
    .testi-text {
      line-height: 1.9; color: rgba(240,230,211,0.75);
      font-style: italic; font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; margin-bottom: 28px;
    }
    .testi-stars { color: var(--gold); font-size: 0.8rem; margin-bottom: 16px; letter-spacing: 2px; }
    .testi-author { display: flex; align-items: center; gap: 14px; }
    .testi-avatar {
      width: 44px; height: 44px; border-radius: 50%;
